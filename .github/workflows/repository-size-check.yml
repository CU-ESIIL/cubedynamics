name: Repository size check

on:
  pull_request:
  push:
    branches: [main]

jobs:
  repository-size-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install policy parser
        run: python -m pip install pyyaml
      - name: Check tracked files
        run: python scripts/check_repository_size.py --mode tracked
