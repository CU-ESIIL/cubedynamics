name: Tests

on:
  push:
    branches: [ main, master ]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run unit tests (offline)
        run: |
          pytest -m "not integration and not online" --maxfail=1 --disable-warnings -q

      - name: Run integration tests (optional)
        if: env.RUN_INTEGRATION == '1' && matrix.python-version == '3.11'
        run: |
          pytest -m "integration"

  streaming-contracts:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run streaming contract tests
        run: |
          pytest tests/test_prism_ncss_streaming.py \
            tests/test_gridmet_streaming_contract.py \
            tests/test_global_climate_streaming.py \
            tests/test_median_split_synchrony_verb.py \
            tests/test_spatial_units.py \
            tests/test_real_fire_vase_gridmet_smoke.py \
            src/cubedynamics/tests/test_streaming_contracts.py \
            --maxfail=1 --disable-warnings -q

  package:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Build distribution artifacts
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"
          python -m build
          python -m twine check dist/*

      - name: Install built wheel in clean environment
        run: |
          python -m venv .pkg-venv
          .pkg-venv/bin/pip install --upgrade pip
          .pkg-venv/bin/pip install dist/*.whl
          .pkg-venv/bin/python -c "import cubedynamics; import cubedynamics.verbs; print(cubedynamics.__version__)"

  docs:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[docs]"

      - name: Build docs
        run: |
          mkdocs build --strict
