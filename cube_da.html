
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
    <style>
    :root {
      /* Viewer override hooks:
         --cd-cube-size
         --cd-axis-font
         --cd-axis-tick-l
         --cd-axis-stroke
      */
      /* Drift centering tuning (DYNAMIC DRIFT CENTERING V1):
         --cd-drift-max-px: maximum horizontal drift in pixels.
         --cd-drift-rot-range-deg: rotation range (deg) that maps to full drift.
         --cd-drift-scale-in: scale that cancels drift when zoomed in.
         --cd-drift-scale-out: scale that enables full drift when zoomed out.
         --cd-drift-smoothing: easing factor for motion smoothing.
      */
      --cd-cube-size: clamp(300px, min(58vh, 58vw), 640px);
      --cube-size: var(--cd-cube-size);
      --cd-axis-font: clamp(11px, calc(var(--cd-cube-size) * 0.045), 18px);
      --cd-axis-pill-px: clamp(4px, calc(var(--cd-cube-size) * 0.010), 8px);
      --cd-axis-stroke: clamp(2px, calc(var(--cd-cube-size) * 0.006), 4px);
      --cd-axis-tick-l: clamp(10px, calc(var(--cd-cube-size) * 0.035), 18px);
      --cd-drift-max-px: 220;
      --cd-drift-rot-range-deg: 55;
      --cd-drift-scale-in: 1.25;
      --cd-drift-scale-out: 0.85;
      --cd-drift-smoothing: 0.18;
      --cube-bg-color: #ffffff; --cube-panel-color: #ffffff; --cube-shadow-strength: 0.15; --cube-title-color: cornflowerblue; --cube-axis-color: rgba(25, 25, 25, 0.9); --cube-legend-color: limegreen; --cube-title-font-size: 20px; --cube-axis-font-size: 12.0px; --cube-legend-font-size: 12.0px; --cube-font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 28px 14px 32px 14px;
      width: 100%;
      height: 100%;
      background: var(--cube-bg-color);
      color: var(--cube-axis-color);
      font-family: var(--cube-font-family);
      display: flex;
      align-items: flex-start;
      justify-content: center;
      overflow: hidden;
      user-select: none;
    }
    .cube-figure {
      width: 100%;
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    .cube-title {
      font-size: var(--cube-title-font-size);
      letter-spacing: 0.04em;
      font-weight: 700;
      text-align: center;
      color: var(--cube-title-color);
      margin-bottom: 4px;
    }
    .cube-main {
      width: 100%;
      display: flex;
      justify-content: center;
    }
    .cube-js-warning {
      width: min(1180px, 100%);
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 6px auto 0 auto;
      padding: 10px 12px;
      background: #fff4d4;
      color: #5c4300;
      border: 1px solid #f2d27c;
      border-radius: 10px;
      font-size: var(--cube-axis-font-size, 13px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
    }
    .cube-js-warning.hidden {
      display: none;
    }
    .cube-js-warning .dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: #f59e0b;
      box-shadow: 0 0 0 4px rgba(245,158,11,0.2);
    }
    .cube-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    .cube-container {
      position: relative;
      width: var(--cube-size);
      height: var(--cube-size);
      margin: auto;
    }

    .cube-wrapper {
      position: relative;
      inset: 0;
      width: 100%;
      height: 100%;
      perspective: 950px;
      transform-style: preserve-3d;
      touch-action: none;
      z-index: 0;
      --rot-x: 0rad;
      --rot-y: 0rad;
      --zoom: 1;
    }

    .cube-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      pointer-events: none;
    }

    .cube-rotation {
      position: absolute;
      inset: 0;
      transform-style: preserve-3d;
      transform:
        rotateX(var(--rot-x, 0rad))
        rotateY(var(--rot-y, 0rad))
        scale(calc(1 / var(--zoom, 1)));
    }

    .cube-drag-surface {
      position: absolute;
      inset: 0;
      z-index: 999;
      cursor: grab;
      background: transparent;
      touch-action: none;
      pointer-events: auto;
    }

    .cube-drag-surface.debug-show {
      background: rgba(0, 255, 0, 0.1);
    }

    .cube-scene {
      position: relative;
      inset: 0;
      width: 100%;
      height: 100%;
      perspective: 950px;
      transform-style: preserve-3d;
    }

    .cube-scene .cube-rotation {
      transform:
        rotateX(var(--rot-x, 0rad))
        rotateY(var(--rot-y, 0rad))
        scale(calc(1 / var(--zoom, 1)));
    }

    .scene-drag-surface {
      position: absolute;
      inset: 0;
      z-index: 999;
      cursor: grab;
      background: transparent;
      touch-action: none;
      pointer-events: auto;
    }

    .cd-drift-center-fallback {
      --cd-drift-x: 0px;
      --cd-drift-base-transform: none;
      transform: translateX(var(--cd-drift-x, 0px)) var(--cd-drift-base-transform, none);
    }

    .cd-cube {
      position: absolute;
      inset: 0;
      transform-style: preserve-3d;
      width: 100%;
      height: 100%;
      transform: translateZ(calc(var(--cube-size) / -2));
      pointer-events: none;
    }

    .cd-face {
      position: absolute;
      width: 100%;
      height: 100%;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      backface-visibility: hidden;
      border: 1px solid rgba(0,0,0,0.08);
      filter: drop-shadow(0 2px 6px rgba(0,0,0,0.25));
      pointer-events: none;
    }

    .cd-front { transform: translateZ(calc(var(--cube-size) / 2)); }
    .cd-back { transform: rotateY(180deg) translateZ(calc(var(--cube-size) / 2)); }
    .cd-right { transform: rotateY(90deg) translateZ(calc(var(--cube-size) / 2)); }
    .cd-left { transform: rotateY(-90deg) translateZ(calc(var(--cube-size) / 2)); }
    .cd-top { transform: rotateX(90deg) translateZ(calc(var(--cube-size) / 2)); }
    .cd-bottom { transform: rotateX(-90deg) translateZ(calc(var(--cube-size) / 2)); }

    .interior-plane {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      background-size: cover;
      background-position: center;
      opacity: 0.65;
      mix-blend-mode: normal;
      border: 1px solid rgba(255,255,255,0.08);
      pointer-events: none;
      transform-style: preserve-3d;
    }

    .cd-vase-panel {
      position: absolute;
      transform-style: preserve-3d;
      backface-visibility: hidden;
      border-radius: 999px;
      opacity: 0.9;
      background: rgba(200, 60, 60, 0.9);
      box-shadow: 0 0 8px rgba(0, 0, 0, var(--cube-shadow-strength, 0.25));
      pointer-events: none;
    }

    .axis-label {
      position: absolute;
      font-size: var(--cube-axis-font-size, 13px);
      color: var(--cube-axis-color);
      pointer-events: none;
    }

    .cube-label {
      position: absolute;
      font-size: var(--cube-axis-font-size, 13px);
      color: var(--cube-axis-color);
      pointer-events: none;
      letter-spacing: 0.04em;
    }

    /* Tight to each cube face */
    .axis-x-min {
      bottom: 5%;
      left: 15%;
    }
    .axis-x-max {
      bottom: 5%;
      right: 15%;
    }
    .axis-x-name {
      bottom: 0%;
      left: 50%;
      transform: translateX(-50%);
    }

    .axis-y-min {
      top: 15%;
      right: 5%;
      transform: rotate(90deg);
    }
    .axis-y-max {
      bottom: 15%;
      right: 5%;
      transform: rotate(90deg);
    }
    .axis-y-name {
      top: 50%;
      right: 0%;
      transform: translateY(-50%) rotate(90deg);
    }

    .axis-t-min {
      left: 5%;
      top: 75%;
      transform: rotate(-90deg);
    }
    .axis-t-max {
      left: 5%;
      top: 25%;
      transform: rotate(-90deg);
    }
    .axis-t-name {
      left: 0%;
      top: 50%;
      transform: translateY(-50%) rotate(-90deg);
    }
    .cube-legend-panel {
      width: 100%;
      display: flex;
      justify-content: center;
      margin-top: 6px;
    }
    .cube-legend-card {
      background: #ffffff;
      padding: 8px 12px;
      border-radius: 10px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
      min-width: min(420px, 90%);
    }
    .colorbar-wrapper {
      width: 100%;
    }
    .colorbar-title {
      font-size: var(--cube-legend-font-size);
      font-weight: 600;
      color: var(--cube-legend-color);
      text-align: center;
      margin-bottom: 6px;
      font-family: var(--cube-font-family);
    }
    .colorbar-img {
      width: 100%;
      height: 14px;
      border-radius: 4px;
      border: 1px solid rgba(0,0,0,0.2);
      display: block;
    }
    .colorbar-labels {
      width: 100%;
      display: flex;
      justify-content: space-between;
      font-size: var(--cube-legend-font-size);
      margin-top: 6px;
      align-self: center;
      color: var(--cube-legend-color);
      gap: 6px;
    }
    .cb-tick {
      flex: 1;
      text-align: center;
    }
    
    [data-axis-rig="true"] .axis-label {
      display: none;
    }

    .cd-axis-rig {
      position: absolute;
      inset: 0;
      width: var(--cd-cube-size, var(--cube-size));
      height: var(--cd-cube-size, var(--cube-size));
      transform-style: preserve-3d;
      pointer-events: none;
      color: var(--cd-axis-color);
      font-size: var(--cd-axis-font, var(--cube-axis-font-size, 13px));
      letter-spacing: 0.04em;
      /* Axis rig lives in cube-local coords; out-z anchors to front face, Y labels shift left for legibility. */
      --cd-axis-color: rgba(25, 25, 25, 0.9);
      --cd-axis-out-x: 16px;
      --cd-axis-out-y: 14px;
      --cd-axis-front-z: calc(0.5 * var(--cd-cube-size, var(--cube-size)));
      --cd-axis-out-z: calc(var(--cd-axis-front-z) + 6px);
      --cd-axis-line-w: var(--cd-axis-stroke, 2px);
      --cd-axis-tick-w: var(--cd-axis-stroke, 1px);
      --cd-axis-tick-l: var(--cd-axis-tick-l, 8px);
      --cd-axis-label-gap: 16px;
      --cd-axis-end-nudge: 6px;
      --cd-axis-x-name-drop: 18px;
      --cd-axis-time-name-drop: 24px;
      --cd-axis-time-label-drop: 18px;
      --cd-axis-y-extra-left: 22px;
      --cd-bb-rot-x: 0rad;
      --cd-bb-rot-y: 0rad;
    }

    .cd-axis-rig--debug {
      outline: 1px dashed rgba(0, 255, 255, 0.6);
    }

    .cd-axis-rig--hide-ticks .cd-axis-ticks {
      display: none;
    }

    .cd-axis-rig--hide-end-labels .cd-axis-end {
      display: none;
    }

    .cd-axis-rig--hide-names .cd-axis-name {
      display: none;
    }

    .cd-axis-group {
      position: absolute;
      transform-style: preserve-3d;
    }

    .cd-axis-line {
      position: absolute;
      background: var(--cd-axis-color);
    }

    .cd-axis-ticks {
      position: absolute;
      inset: 0;
    }

    .cd-axis-tick {
      position: absolute;
    }

    .cd-axis-tick-mark {
      position: absolute;
      background: var(--cd-axis-color);
    }

    .cd-axis-label {
      position: absolute;
      white-space: nowrap;
    }

    .cd-axis-label-face {
      display: inline-block;
      padding: var(--cd-axis-pill-px, 0px);
      transform-style: preserve-3d;
      transform: rotateX(var(--cd-bb-rot-x)) rotateY(var(--cd-bb-rot-y));
    }

    .cd-axis-label-face--time {
      transform: rotateX(var(--cd-bb-rot-x)) rotateY(var(--cd-bb-rot-y));
    }

    /* X axis (longitude) - front bottom edge */
    .cd-axis-x {
      left: 0;
      bottom: 0;
      width: 100%;
      height: 0;
      transform: translate3d(0, var(--cd-axis-out-y), var(--cd-axis-out-z));
    }

    .cd-axis-x .cd-axis-line {
      left: 0;
      top: 0;
      width: 100%;
      height: var(--cd-axis-line-w);
    }

    .cd-axis-x .cd-axis-tick {
      top: 0;
      transform: translateX(-50%);
    }

    .cd-axis-x .cd-axis-tick-mark {
      width: var(--cd-axis-tick-w);
      height: var(--cd-axis-tick-l);
      left: 50%;
      top: calc(-0.5 * var(--cd-axis-tick-l) + 0.5 * var(--cd-axis-line-w));
      transform: translateX(-50%);
    }

    .cd-axis-x .cd-axis-tick-label {
      position: absolute;
      left: 50%;
      top: calc(-1 * var(--cd-axis-label-gap));
      transform: translateX(-50%);
    }

    .cd-axis-x .cd-axis-end--min {
      left: 0;
      top: var(--cd-axis-x-name-drop);
      transform: translateX(calc(-1 * var(--cd-axis-end-nudge)));
    }

    .cd-axis-x .cd-axis-end--max {
      left: 100%;
      top: var(--cd-axis-x-name-drop);
      transform: translateX(calc(-100% + var(--cd-axis-end-nudge)));
    }

    .cd-axis-x .cd-axis-name {
      left: 50%;
      top: var(--cd-axis-x-name-drop);
      transform: translateX(-50%);
    }

    /* Y axis (latitude) - front left edge */
    .cd-axis-y {
      left: 0;
      bottom: 0;
      width: 0;
      height: 100%;
      transform: translate3d(calc(-1 * var(--cd-axis-out-x)), 0, var(--cd-axis-out-z));
    }

    .cd-axis-y .cd-axis-line {
      left: 0;
      bottom: 0;
      width: var(--cd-axis-line-w);
      height: 100%;
    }

    .cd-axis-y .cd-axis-tick {
      left: 0;
      transform: translateY(50%);
    }

    .cd-axis-y .cd-axis-tick-mark {
      width: var(--cd-axis-tick-l);
      height: var(--cd-axis-tick-w);
      left: calc(-1 * var(--cd-axis-tick-l) + 0.5 * var(--cd-axis-line-w));
      top: 50%;
      transform: translateY(-50%);
    }

    .cd-axis-y .cd-axis-tick-label {
      position: absolute;
      left: calc(
        -1 * (var(--cd-axis-label-gap) + var(--cd-axis-tick-l) + 12px + var(--cd-axis-y-extra-left))
      );
      top: 50%;
      transform: translateY(-50%);
    }

    .cd-axis-y .cd-axis-end--min {
      left: calc(
        -1 * (var(--cd-axis-label-gap) + var(--cd-axis-tick-l) + 12px + var(--cd-axis-y-extra-left))
      );
      bottom: 0;
      transform: translateY(calc(var(--cd-axis-end-nudge)));
    }

    .cd-axis-y .cd-axis-end--max {
      left: calc(
        -1 * (var(--cd-axis-label-gap) + var(--cd-axis-tick-l) + 12px + var(--cd-axis-y-extra-left))
      );
      bottom: 100%;
      transform: translateY(calc(-100% - var(--cd-axis-end-nudge)));
    }

    .cd-axis-y .cd-axis-name {
      left: calc(
        -1 * (var(--cd-axis-label-gap) + var(--cd-axis-tick-l) + 12px + var(--cd-axis-y-extra-left))
      );
      bottom: 50%;
      transform: translateY(50%);
    }

    .cd-axis-y .cd-axis-label-face {
      transform-origin: 100% 50%;
    }

    /* Time axis - bottom right edge, rotated into depth */
    .cd-axis-time {
      left: 100%;
      bottom: 0;
      width: 100%;
      height: 0;
      transform-origin: left center;
      transform: translate3d(var(--cd-axis-out-x), var(--cd-axis-out-y), var(--cd-axis-out-z)) rotateY(90deg);
    }

    .cd-axis-time .cd-axis-line {
      left: 0;
      top: 0;
      width: 100%;
      height: var(--cd-axis-line-w);
    }

    .cd-axis-time .cd-axis-tick {
      top: 0;
      transform: translateX(-50%);
    }

    .cd-axis-time .cd-axis-tick-mark {
      width: var(--cd-axis-tick-w);
      height: var(--cd-axis-tick-l);
      left: 50%;
      top: calc(-0.5 * var(--cd-axis-tick-l) + 0.5 * var(--cd-axis-line-w));
      transform: translateX(-50%);
    }

    .cd-axis-time .cd-axis-tick-label {
      position: absolute;
      left: 50%;
      top: var(--cd-axis-time-label-drop);
      transform: translateX(-50%);
    }

    .cd-axis-time .cd-axis-end--min {
      left: 0;
      top: var(--cd-axis-time-label-drop);
      transform: translateX(calc(-1 * var(--cd-axis-end-nudge)));
    }

    .cd-axis-time .cd-axis-end--max {
      left: 100%;
      top: var(--cd-axis-time-label-drop);
      transform: translateX(calc(-100% + var(--cd-axis-end-nudge)));
    }

    .cd-axis-time .cd-axis-name {
      left: 50%;
      top: var(--cd-axis-time-name-drop);
      transform: translateX(-50%);
    }
    
  </style>
</head>

              tickEl.style.left = (tick.frac * 100) + "%";
            }

            const mark = document.createElement("div");
            mark.className = "cd-axis-tick-mark";
            tickEl.appendChild(mark);

            if (tick.label && (!options.subsampleLabels || (idx % labelStep === 0) || idx === ticks.length - 1)) {
              const label = document.createElement("div");
              label.className = "cd-axis-tick-label";
              const labelFace = document.createElement("span");
              labelFace.className = axisKey === "time" ? "cd-axis-label-face cd-axis-label-face--time" : "cd-axis-label-face";
              labelFace.textContent = tick.label;
              label.appendChild(labelFace);
              tickEl.appendChild(label);
            }

            ticksHost.appendChild(tickEl);
          });
        };

        if (axisMeta) {
          renderAxis("x", axisRig.querySelector(".cd-axis-x"), axisMeta.x || null);
          renderAxis("y", axisRig.querySelector(".cd-axis-y"), axisMeta.y || null);
          renderAxis("time", axisRig.querySelector(".cd-axis-time"), axisMeta.time || null, { subsampleLabels: true });
        }

        updateAxisRigBillboard();
      }
    

      try {
        if (!canvas || !cubeRotation || !rotationTarget) {
          showWarning("<strong>Interactive controls unavailable.</strong> Viewer elements failed to initialize.");
          return;
        }

        const gl = canvas.getContext("webgl");

        // Maintain a universal reference frame via CSS variables so scenes with
        // multiple cubes can share rotation/zoom state.
        function applyCubeRotation() {
          if (cubeWrapper) {
            cubeWrapper.style.setProperty("--rot-x", rotationX + "rad");
            cubeWrapper.style.setProperty("--rot-y", rotationY + "rad");
            cubeWrapper.style.setProperty("--zoom", zoom);
          }
          if (!cubeWrapper && rotationTarget) {
            rotationTarget.style.setProperty("--rot-x", rotationX + "rad");
            rotationTarget.style.setProperty("--rot-y", rotationY + "rad");
            rotationTarget.style.setProperty("--zoom", zoom);
          }
          if (updateAxisRigBillboard) {
            updateAxisRigBillboard();
          }
        }

        applyCubeRotation();

        let dragging = false;
        let activePointerId = null;
        let startX = 0, startY = 0;
        let startRotX = rotationX, startRotY = rotationY;

        const handlePointerMove = (e) => {
          if (!dragging || (activePointerId !== null && e.pointerId !== activePointerId)) {
            return;
          }
          const dx = e.clientX - startX;
          const dy = e.clientY - startY;
          rotationY = startRotY + dx * 0.01;
          rotationX = startRotX + dy * 0.01;
          applyCubeRotation();
        };

        function stopDragging(e) {
          if (!dragging) return;
          if (activePointerId !== null && e && e.pointerId !== activePointerId) return;
          dragging = false;
          window.removeEventListener("pointermove", handlePointerMove);
          if (dragSurface && activePointerId !== null && dragSurface.hasPointerCapture(activePointerId)) {
            dragSurface.releasePointerCapture(activePointerId);
          }
          if (dragSurface) {
            dragSurface.style.cursor = "grab";
          }
          activePointerId = null;
        }

        if (dragSurface) {
          dragSurface.style.cursor = "grab";
          dragSurface.style.touchAction = "none";

          dragSurface.addEventListener("pointerdown", e => {
            e.preventDefault();
            e.stopPropagation();
            dragging = true;
            activePointerId = e.pointerId;
            startX = e.clientX;
            startY = e.clientY;
            startRotX = rotationX;
            startRotY = rotationY;
            dragSurface.setPointerCapture(e.pointerId);
            dragSurface.style.cursor = "grabbing";
            window.addEventListener("pointermove", handlePointerMove);
          });

          dragSurface.addEventListener("pointerup", endEvent => {
            stopDragging(endEvent);
          });

          dragSurface.addEventListener("pointercancel", endEvent => {
            stopDragging(endEvent);
          });

          dragSurface.addEventListener("wheel", e => {
            e.preventDefault();
            const delta = e.deltaY;
            const zoomFactor = Math.exp(delta * 0.0015);
            zoom = Math.min(zoomMax, Math.max(zoomMin, zoom * zoomFactor));
            applyCubeRotation();
          }, { passive: false });
        } else {
          showWarning("<strong>Interactive controls unavailable.</strong> Drag surface missing.");
        }

        window.addEventListener("pointerup", endEvent => stopDragging(endEvent));
        window.addEventListener("pointercancel", endEvent => stopDragging(endEvent));

        if (!gl) {
          console.warn("[CubeViewer] WebGL unavailable; rendering CSS cube only for viewerId", viewerId);
          showWarning('<strong>WebGL unavailable.</strong> Falling back to CSS-only cube rendering (rotation and zoom still work).');
        }
      } catch (err) {
        console.error("[CubeViewer] Failed to initialize viewer", viewerId, err);
        showWarning("<strong>Interactive controls unavailable.</strong> Failed to initialize viewer script.");
      }

      const cbMin = root.getAttribute("data-cb-min");
      const cbMax = root.getAttribute("data-cb-max");
      if (cbMin !== null) {
        const minEl = document.getElementById("cb-min-" + viewerId);
        if (minEl) minEl.innerText = cbMin;
      }
      if (cbMax !== null) {
        const maxEl = document.getElementById("cb-max-" + viewerId);
        if (maxEl) maxEl.innerText = cbMax;
      }
    })();
  </script>
</body>
</html>
