  <script id="cd-drift-center-v1-js">
    (function() {
      // Drift centering defaults (DYNAMIC DRIFT CENTERING V1):
      // MAX_DRIFT_PX=220, ROT_RANGE_DEG=55, SCALE_IN=1.25, SCALE_OUT=0.85, SMOOTHING=0.18
      const viewerId = "8702be5840784858b311e105b1b06990";
      const defaults = {
        maxDriftPx: 220,
        rotRangeDeg: 55,
        scaleIn: 1.25,
        scaleOut: 0.85,
        smoothing: 0.18,
      };

      const registry = window.__cdDriftCenterV1 || {
        viewers: new Set(),
        rafId: null,
      };
      window.__cdDriftCenterV1 = registry;
      window.__cdDriftCenterInstalled = true;

      function readNumber(styles, name, fallback) {
        const value = parseFloat(styles.getPropertyValue(name));
        return Number.isFinite(value) ? value : fallback;
      }

      function resolveConfig(root) {
        const styles = getComputedStyle(root);
        return {
          maxDriftPx: readNumber(styles, "--cd-drift-max-px", defaults.maxDriftPx),
          rotRangeDeg: readNumber(styles, "--cd-drift-rot-range-deg", defaults.rotRangeDeg),
          scaleIn: readNumber(styles, "--cd-drift-scale-in", defaults.scaleIn),
          scaleOut: readNumber(styles, "--cd-drift-scale-out", defaults.scaleOut),
          smoothing: readNumber(styles, "--cd-drift-smoothing", defaults.smoothing),
        };
      }

      function getViewerRoots() {
        if (viewerId) {
          const root = document.getElementById("cube-figure-" + viewerId);
          return root ? [root] : Array.from(document.querySelectorAll(".cube-figure"));
        }
        return Array.from(document.querySelectorAll(".cube-figure"));
      }

      function applyDrift(state, x) {
        if (state.supportsTranslate) {
          state.scene.style.translate = `${x}px 0px`;
          return;
        }
        if (!state.fallbackReady) {
          const baseTransform = getComputedStyle(state.scene).transform;
          state.scene.style.setProperty(
            "--cd-drift-base-transform",
            baseTransform && baseTransform !== "none" ? baseTransform : "none",
          );
          state.scene.classList.add("cd-drift-center-fallback");
          state.fallbackReady = true;
        }
        state.scene.style.setProperty("--cd-drift-x", `${x}px`);
      }

      function updateViewer(state) {
        const transform = getComputedStyle(state.rotation).transform;
        const matrix = new DOMMatrixReadOnly(transform === "none" ? undefined : transform);
        const scale = Math.hypot(matrix.m11, matrix.m12, matrix.m13) || 1;
        const rotY = Math.atan2(matrix.m13, matrix.m11);
        const rotDeg = rotY * 180 / Math.PI;
        const normRot = Math.max(-1, Math.min(1, rotDeg / state.config.rotRangeDeg));
        const z = Math.max(
          0,
          Math.min(
            1,
            (scale - state.config.scaleOut) / (state.config.scaleIn - state.config.scaleOut),
          ),
        );
        const strength = 1 - z;
        state.targetX = -normRot * state.config.maxDriftPx * strength;
        state.currentX = state.currentX + (state.targetX - state.currentX) * state.config.smoothing;
        applyDrift(state, state.currentX);
      }

      function tick() {
        registry.viewers.forEach((state) => {
          if (!state.root.isConnected) {
            registry.viewers.delete(state);
            return;
          }
          updateViewer(state);
        });
        if (registry.viewers.size > 0) {
          registry.rafId = window.requestAnimationFrame(tick);
        } else {
          registry.rafId = null;
        }
      }

      function registerViewer(root) {
        if (!root || root.dataset.cdDriftCenterInstalled === "true") return;
        const rotation = root.querySelector(".cube-rotation");
        const scene =
          root.querySelector(".cube-scene")
          || root.querySelector(".cube-wrapper");
        if (!rotation || !scene) return;
        root.dataset.cdDriftCenterInstalled = "true";
        const state = {
          root,
          rotation,
          scene,
          config: resolveConfig(root),
          currentX: 0,
          targetX: 0,
          supportsTranslate: "translate" in document.documentElement.style,
          fallbackReady: false,
        };
        registry.viewers.add(state);
        if (!registry.rafId) {
          registry.rafId = window.requestAnimationFrame(tick);
        }
      }

      getViewerRoots().forEach(registerViewer);
    })();
  </script>
    
  <script>
    (function() {
      const viewerId = "8702be5840784858b311e105b1b06990";
      const root = document.getElementById("cube-figure-" + viewerId);
      if (!root) {
        console.warn("[CubeViewer] Root element not found for viewerId", viewerId);
        return;
      }

      const canvas = document.getElementById("cube-canvas-" + viewerId);
      const cubeRotation = document.getElementById("cube-rotation-" + viewerId);
      const cubeWrapper = document.getElementById("cube-wrapper-" + viewerId);
      const scene = cubeWrapper ? cubeWrapper.closest(".cube-scene") : null;
      const sceneDragSurface = scene ? scene.querySelector(".scene-drag-surface") : null;
      const dragSurface =
        document.getElementById("cube-drag-" + viewerId)
        || sceneDragSurface
        || cubeWrapper;
      const rotationTarget = cubeWrapper || scene;
      const jsWarning = document.getElementById("cube-js-warning-" + viewerId);
      const jsWarningText = jsWarning ? jsWarning.querySelector(".cube-warning-text") : null;
      let updateAxisRigBillboard = null;

      const showWarning = (message) => {
        if (!jsWarning) return;
        if (jsWarningText && message) {
          jsWarningText.innerHTML = message;
        }
        jsWarning.classList.remove("hidden");
      };

      const data = root.dataset || {};
      let rotationX = (parseFloat(data.rotX) || 0) * Math.PI / 180;
      let rotationY = (parseFloat(data.rotY) || 0) * Math.PI / 180;
      let zoom = parseFloat(data.zoom) || 1;
      const zoomMin = 0.35;
      const zoomMax = 6.0;
      
      const axisRig = document.getElementById("cd-axis-rig-8702be5840784858b311e105b1b06990");
      if (axisRig) {
        const target =
          (cubeRotation && cubeRotation.querySelector(".cd-cube"))
          || cubeRotation
          || cubeWrapper
          || scene;
        if (target && axisRig.parentElement !== target) {
          target.appendChild(axisRig);
        }

        const axisMeta = (window.__CD_AXIS_META__ || {})["8702be5840784858b311e105b1b06990"] || null;
        const labelMax = parseInt(axisRig.dataset.timeLabelMax || "10", 10);

        const readRotationFromMatrix = (el) => {
          if (!el) return null;
          const transform = window.getComputedStyle(el).transform;
          if (!transform || transform === "none") return null;
          try {
            const matrix = new DOMMatrixReadOnly(transform);
            const rotY = Math.atan2(matrix.m13, matrix.m11);
            const rotX = Math.atan2(matrix.m32, matrix.m33);
            return { rotX, rotY };
          } catch (err) {
            return null;
          }
        };

        updateAxisRigBillboard = () => {
          let rotX = rotationX;
          let rotY = rotationY;
          if (!Number.isFinite(rotX) || !Number.isFinite(rotY)) {
            const fallback = readRotationFromMatrix(cubeRotation || rotationTarget);
            if (fallback) {
              rotX = fallback.rotX;
              rotY = fallback.rotY;
            } else {
              rotX = 0;
              rotY = 0;
            }
          }
          axisRig.style.setProperty("--cd-bb-rot-x", (-rotX) + "rad");
          axisRig.style.setProperty("--cd-bb-rot-y", (-rotY) + "rad");
        };

        const renderAxis = (axisKey, axisGroup, meta, options = {}) => {
          if (!axisGroup || !meta) return;
          const endMin = axisGroup.querySelector(".cd-axis-end--min .cd-axis-label-face");
          const endMax = axisGroup.querySelector(".cd-axis-end--max .cd-axis-label-face");
          const nameEl = axisGroup.querySelector(".cd-axis-name .cd-axis-label-face");
          if (axisKey === "time") {
            // Time runs front (max/tN) to back (min/t0) along the depth edge.
            if (endMin) endMin.textContent = meta.max_label || "";
            if (endMax) endMax.textContent = meta.min_label || "";
          } else {
            if (endMin) endMin.textContent = meta.min_label || "";
            if (endMax) endMax.textContent = meta.max_label || "";
          }
          if (nameEl) nameEl.textContent = meta.name || "";

          const ticksHost = axisGroup.querySelector(".cd-axis-ticks");
          if (!ticksHost || !Array.isArray(meta.ticks)) return;
          ticksHost.innerHTML = "";

          const ticks = meta.ticks;
          let labelStep = 1;
          if (options.subsampleLabels && labelMax > 0 && ticks.length > labelMax) {
            labelStep = Math.max(1, Math.ceil(ticks.length / labelMax));
          }

          ticks.forEach((tick, idx) => {
            const tickEl = document.createElement("div");
            tickEl.className = "cd-axis-tick";

            if (axisKey === "y") {
              tickEl.style.bottom = (tick.frac * 100) + "%";
            } else if (axisKey === "time") {
              // Depth axis: frac=1 (newest) is front, so flip to map to left=0%.
              tickEl.style.left = ((1 - tick.frac) * 100) + "%";
            } else {
              tickEl.style.left = (tick.frac * 100) + "%";
            }

            const mark = document.createElement("div");
            mark.className = "cd-axis-tick-mark";
            tickEl.appendChild(mark);

            if (tick.label && (!options.subsampleLabels || (idx % labelStep === 0) || idx === ticks.length - 1)) {
              const label = document.createElement("div");
              label.className = "cd-axis-tick-label";
              const labelFace = document.createElement("span");
              labelFace.className = axisKey === "time" ? "cd-axis-label-face cd-axis-label-face--time" : "cd-axis-label-face";
              labelFace.textContent = tick.label;
              label.appendChild(labelFace);
              tickEl.appendChild(label);
            }

            ticksHost.appendChild(tickEl);
          });
        };

        if (axisMeta) {
          renderAxis("x", axisRig.querySelector(".cd-axis-x"), axisMeta.x || null);
          renderAxis("y", axisRig.querySelector(".cd-axis-y"), axisMeta.y || null);
          renderAxis("time", axisRig.querySelector(".cd-axis-time"), axisMeta.time || null, { subsampleLabels: true });
        }

        updateAxisRigBillboard();
      }
    

      try {
        if (!canvas || !cubeRotation || !rotationTarget) {
          showWarning("<strong>Interactive controls unavailable.</strong> Viewer elements failed to initialize.");
          return;
        }

        const gl = canvas.getContext("webgl");

        // Maintain a universal reference frame via CSS variables so scenes with
        // multiple cubes can share rotation/zoom state.
        function applyCubeRotation() {
          if (cubeWrapper) {
            cubeWrapper.style.setProperty("--rot-x", rotationX + "rad");
            cubeWrapper.style.setProperty("--rot-y", rotationY + "rad");
            cubeWrapper.style.setProperty("--zoom", zoom);
          }
          if (!cubeWrapper && rotationTarget) {
            rotationTarget.style.setProperty("--rot-x", rotationX + "rad");
            rotationTarget.style.setProperty("--rot-y", rotationY + "rad");
            rotationTarget.style.setProperty("--zoom", zoom);
          }
          if (updateAxisRigBillboard) {
            updateAxisRigBillboard();
          }
        }

        applyCubeRotation();

        let dragging = false;
        let activePointerId = null;
        let startX = 0, startY = 0;
        let startRotX = rotationX, startRotY = rotationY;

        const handlePointerMove = (e) => {
          if (!dragging || (activePointerId !== null && e.pointerId !== activePointerId)) {
            return;
          }
          const dx = e.clientX - startX;
          const dy = e.clientY - startY;
          rotationY = startRotY + dx * 0.01;
          rotationX = startRotX + dy * 0.01;
          applyCubeRotation();
        };

        function stopDragging(e) {
          if (!dragging) return;
          if (activePointerId !== null && e && e.pointerId !== activePointerId) return;
          dragging = false;
          window.removeEventListener("pointermove", handlePointerMove);
          if (dragSurface && activePointerId !== null && dragSurface.hasPointerCapture(activePointerId)) {
            dragSurface.releasePointerCapture(activePointerId);
          }
          if (dragSurface) {
            dragSurface.style.cursor = "grab";
          }
          activePointerId = null;
        }

        if (dragSurface) {
          dragSurface.style.cursor = "grab";
          dragSurface.style.touchAction = "none";

          dragSurface.addEventListener("pointerdown", e => {
            e.preventDefault();
            e.stopPropagation();
            dragging = true;
            activePointerId = e.pointerId;
            startX = e.clientX;
            startY = e.clientY;
            startRotX = rotationX;
            startRotY = rotationY;
            dragSurface.setPointerCapture(e.pointerId);
            dragSurface.style.cursor = "grabbing";
            window.addEventListener("pointermove", handlePointerMove);
          });

          dragSurface.addEventListener("pointerup", endEvent => {
            stopDragging(endEvent);
          });

          dragSurface.addEventListener("pointercancel", endEvent => {
            stopDragging(endEvent);
          });

          dragSurface.addEventListener("wheel", e => {
            e.preventDefault();
            const delta = e.deltaY;
            const zoomFactor = Math.exp(delta * 0.0015);
            zoom = Math.min(zoomMax, Math.max(zoomMin, zoom * zoomFactor));
            applyCubeRotation();
          }, { passive: false });
        } else {
          showWarning("<strong>Interactive controls unavailable.</strong> Drag surface missing.");
        }

        window.addEventListener("pointerup", endEvent => stopDragging(endEvent));
        window.addEventListener("pointercancel", endEvent => stopDragging(endEvent));

        if (!gl) {
          console.warn("[CubeViewer] WebGL unavailable; rendering CSS cube only for viewerId", viewerId);
          showWarning('<strong>WebGL unavailable.</strong> Falling back to CSS-only cube rendering (rotation and zoom still work).');
        }
      } catch (err) {
        console.error("[CubeViewer] Failed to initialize viewer", viewerId, err);
        showWarning("<strong>Interactive controls unavailable.</strong> Failed to initialize viewer script.");
      }

      const cbMin = root.getAttribute("data-cb-min");
      const cbMax = root.getAttribute("data-cb-max");
      if (cbMin !== null) {
        const minEl = document.getElementById("cb-min-" + viewerId);
        if (minEl) minEl.innerText = cbMin;
      }
      if (cbMax !== null) {
        const maxEl = document.getElementById("cb-max-" + viewerId);
        if (maxEl) maxEl.innerText = cbMax;
      }
    })();
  </script>
